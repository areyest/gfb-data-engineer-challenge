<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 880" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0a8754"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1d4ed8"/>
    </marker>
    <linearGradient id="bronze" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e5e7eb"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <style>
      .lane{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1}
      .lane-label{font-weight:700;fill:#0f172a;font-size:14px}
      .src{fill:#dbeafe;stroke:#1d4ed8;stroke-width:1.5;rx:8;ry:8}
      .ingest{fill:#dcfce7;stroke:#0a8754;stroke-width:1.5;rx:8;ry:8}
      .compute{fill:#fae8ff;stroke:#a21caf;stroke-width:1.5;rx:8;ry:8}
      .serv{fill:#fef3c7;stroke:#b45309;stroke-width:1.5;rx:8;ry:8}
      .gov{fill:#fee2e2;stroke:#b91c1c;stroke-width:1.5;rx:8;ry:8}
      .neo{fill:#cffafe;stroke:#0e7490;stroke-width:1.5;rx:8;ry:8}
      .title{font-weight:700;fill:#0f172a}
      .sub{fill:#475569;font-size:11px}
      .flow{stroke:#444;stroke-width:1.6;fill:none}
      .flow-cdc{stroke:#0a8754;stroke-width:2;fill:none;stroke-dasharray:6 3}
      .flow-batch{stroke:#1d4ed8;stroke-width:1.6;fill:none}
    </style>
  </defs>

  <text x="640" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Arquitectura propuesta — Consolidación F1 + F2 + F3 (Lakehouse + Grafos)</text>
  <text x="640" y="52" text-anchor="middle" class="sub">SQL operativo (Trino) + Ciencia de datos (Spark / Polars / Neo4j)</text>

  <!-- Lane: Sources -->
  <rect class="lane" x="20" y="80" width="260" height="720"/>
  <text class="lane-label" x="40" y="100">1. Fuentes operativas (24/7)</text>

  <rect class="src" x="40" y="120" width="220" height="80"/>
  <text class="title" x="150" y="145" text-anchor="middle">F1 — CRM propietario</text>
  <text class="sub" x="150" y="165" text-anchor="middle">Clientes, demográficos, contacto</text>
  <text class="sub" x="150" y="183" text-anchor="middle">API REST / export programado</text>

  <rect class="src" x="40" y="220" width="220" height="80"/>
  <text class="title" x="150" y="245" text-anchor="middle">F2 — SQL Server</text>
  <text class="sub" x="150" y="265" text-anchor="middle">Tx productos A (mitad)</text>
  <text class="sub" x="150" y="283" text-anchor="middle">CDC nativo (TX replication)</text>

  <rect class="src" x="40" y="320" width="220" height="80"/>
  <text class="title" x="150" y="345" text-anchor="middle">F3 — PostgreSQL</text>
  <text class="sub" x="150" y="365" text-anchor="middle">Tx productos B (resto)</text>
  <text class="sub" x="150" y="383" text-anchor="middle">Logical replication (WAL)</text>

  <text class="sub" x="40" y="430">Subconjunto extraído (mínimo):</text>
  <text class="sub" x="40" y="448">F1: client_id, segment, demogr.,</text>
  <text class="sub" x="40" y="464">    contacto (PII), updated_at</text>
  <text class="sub" x="40" y="484">F2/F3: tx_id, client_id, product_id,</text>
  <text class="sub" x="40" y="500">    amount, currency, status, channel,</text>
  <text class="sub" x="40" y="516">    created_at, updated_at</text>

  <!-- Lane: Ingest -->
  <rect class="lane" x="300" y="80" width="240" height="720"/>
  <text class="lane-label" x="320" y="100">2. Captura &amp; Streaming</text>

  <rect class="ingest" x="320" y="120" width="200" height="80"/>
  <text class="title" x="420" y="145" text-anchor="middle">Airbyte / Fivetran</text>
  <text class="sub" x="420" y="165" text-anchor="middle">Connector CRM</text>
  <text class="sub" x="420" y="183" text-anchor="middle">incremental (updated_at)</text>

  <rect class="ingest" x="320" y="220" width="200" height="80"/>
  <text class="title" x="420" y="245" text-anchor="middle">Debezium (Kafka Connect)</text>
  <text class="sub" x="420" y="265" text-anchor="middle">SQL Server connector</text>
  <text class="sub" x="420" y="283" text-anchor="middle">CDC desde transaction log</text>

  <rect class="ingest" x="320" y="320" width="200" height="80"/>
  <text class="title" x="420" y="345" text-anchor="middle">Debezium (Kafka Connect)</text>
  <text class="sub" x="420" y="365" text-anchor="middle">PostgreSQL connector</text>
  <text class="sub" x="420" y="383" text-anchor="middle">Logical decoding (pgoutput)</text>

  <rect class="ingest" x="320" y="440" width="200" height="100"/>
  <text class="title" x="420" y="465" text-anchor="middle">Apache Kafka</text>
  <text class="sub" x="420" y="485" text-anchor="middle">Topics: f1.crm.*, f2.tx.*, f3.tx.*</text>
  <text class="sub" x="420" y="503" text-anchor="middle">Schema Registry (Avro)</text>
  <text class="sub" x="420" y="521" text-anchor="middle">Particionado por client_id</text>

  <rect class="ingest" x="320" y="560" width="200" height="80"/>
  <text class="title" x="420" y="585" text-anchor="middle">Apache Flink</text>
  <text class="sub" x="420" y="605" text-anchor="middle">Stream → Bronze (Iceberg)</text>
  <text class="sub" x="420" y="623" text-anchor="middle">Sink + DLQ</text>

  <!-- Lane: Lakehouse -->
  <rect class="lane" x="560" y="80" width="320" height="720"/>
  <text class="lane-label" x="580" y="100">3. Lakehouse (Object Storage + Iceberg)</text>

  <rect x="580" y="120" width="280" height="100" rx="8" ry="8" fill="url(#bronze)" stroke="#b45309"/>
  <text class="title" x="720" y="145" text-anchor="middle">Bronze — raw inmutable</text>
  <text class="sub" x="720" y="165" text-anchor="middle">Iceberg, partición por fecha+fuente</text>
  <text class="sub" x="720" y="183" text-anchor="middle">Captura 1:1 de los topics</text>
  <text class="sub" x="720" y="201" text-anchor="middle">Retención &gt; 90d para reproceso</text>

  <rect x="580" y="240" width="280" height="120" rx="8" ry="8" fill="url(#silver)" stroke="#475569"/>
  <text class="title" x="720" y="265" text-anchor="middle">Silver — limpio &amp; conformado</text>
  <text class="sub" x="720" y="285" text-anchor="middle">Dedupe, SCD2 de dim_customer</text>
  <text class="sub" x="720" y="303" text-anchor="middle">Schema unificado tx F2 ∪ F3</text>
  <text class="sub" x="720" y="321" text-anchor="middle">PII enmascarada / tokenizada</text>
  <text class="sub" x="720" y="339" text-anchor="middle">Tablas: dim_customer, fact_tx</text>

  <rect x="580" y="380" width="280" height="120" rx="8" ry="8" fill="url(#gold)" stroke="#a16207"/>
  <text class="title" x="720" y="405" text-anchor="middle">Gold — marts &amp; features</text>
  <text class="sub" x="720" y="425" text-anchor="middle">Agregados día/cliente/producto</text>
  <text class="sub" x="720" y="443" text-anchor="middle">Customer 360 (operativo)</text>
  <text class="sub" x="720" y="461" text-anchor="middle">Feature store (offline)</text>
  <text class="sub" x="720" y="479" text-anchor="middle">Vistas materializadas en Iceberg</text>

  <rect class="compute" x="580" y="520" width="280" height="80"/>
  <text class="title" x="720" y="545" text-anchor="middle">Spark / dbt-trino</text>
  <text class="sub" x="720" y="565" text-anchor="middle">Bronze → Silver → Gold</text>
  <text class="sub" x="720" y="583" text-anchor="middle">Tests dbt + Great Expectations</text>

  <rect class="gov" x="580" y="620" width="280" height="80"/>
  <text class="title" x="720" y="645" text-anchor="middle">Hive Metastore / Glue / Polaris</text>
  <text class="sub" x="720" y="665" text-anchor="middle">Catálogo Iceberg (compartido)</text>
  <text class="sub" x="720" y="683" text-anchor="middle">Snapshots, time-travel, ACID</text>

  <text class="sub" x="580" y="730">Object storage: S3 / MinIO / ADLS / GCS</text>
  <text class="sub" x="580" y="748">Encriptación KMS at rest, TLS in transit</text>
  <text class="sub" x="580" y="766">Object Lock (immutable Bronze)</text>

  <!-- Lane: Serving -->
  <rect class="lane" x="900" y="80" width="360" height="720"/>
  <text class="lane-label" x="920" y="100">4. Consumo</text>

  <rect class="serv" x="920" y="120" width="320" height="120"/>
  <text class="title" x="1080" y="145" text-anchor="middle">Trino (SQL operativo)</text>
  <text class="sub" x="1080" y="165" text-anchor="middle">Lee Iceberg sobre Silver+Gold</text>
  <text class="sub" x="1080" y="183" text-anchor="middle">RBAC vía Apache Ranger / OPA</text>
  <text class="sub" x="1080" y="201" text-anchor="middle">Column-level masking PII</text>
  <text class="sub" x="1080" y="219" text-anchor="middle">Clientes: DBeaver, Metabase, Looker</text>

  <rect class="serv" x="920" y="260" width="320" height="120"/>
  <text class="title" x="1080" y="285" text-anchor="middle">Spark / Polars (Ciencia de datos)</text>
  <text class="sub" x="1080" y="305" text-anchor="middle">Notebooks Jupyter / Databricks</text>
  <text class="sub" x="1080" y="323" text-anchor="middle">MLlib, scikit-learn, Polars</text>
  <text class="sub" x="1080" y="341" text-anchor="middle">Clustering, modelos batch</text>
  <text class="sub" x="1080" y="359" text-anchor="middle">Lectura directa de Iceberg/Parquet</text>

  <rect class="neo" x="920" y="400" width="320" height="120"/>
  <text class="title" x="1080" y="425" text-anchor="middle">Neo4j (Búsquedas en grafos)</text>
  <text class="sub" x="1080" y="445" text-anchor="middle">Sync ETL desde Silver (clientes,</text>
  <text class="sub" x="1080" y="463" text-anchor="middle">tx, productos) → nodos/aristas</text>
  <text class="sub" x="1080" y="481" text-anchor="middle">Cypher: anti-fraude, comunidades</text>
  <text class="sub" x="1080" y="499" text-anchor="middle">Alt: Spark GraphFrames</text>

  <!-- Cross: Orchestration & Governance -->
  <rect class="lane" x="20" y="540" width="260" height="260"/>
  <text class="lane-label" x="40" y="560">5. Orquestación &amp; Gobernanza</text>

  <rect class="compute" x="40" y="580" width="220" height="60"/>
  <text class="title" x="150" y="605" text-anchor="middle">Apache Airflow</text>
  <text class="sub" x="150" y="623" text-anchor="middle">DAGs batch + watermarks</text>

  <rect class="gov" x="40" y="650" width="220" height="60"/>
  <text class="title" x="150" y="675" text-anchor="middle">DataHub / OpenMetadata</text>
  <text class="sub" x="150" y="693" text-anchor="middle">Catálogo + lineage + glosario</text>

  <rect class="gov" x="40" y="720" width="220" height="60"/>
  <text class="title" x="150" y="745" text-anchor="middle">Vault / Secrets Manager</text>
  <text class="sub" x="150" y="763" text-anchor="middle">Credenciales centralizadas</text>

  <!-- Flows -->
  <!-- F1 -> Airbyte -->
  <line class="flow-batch" x1="260" y1="160" x2="320" y2="160" marker-end="url(#arrowBlue)"/>
  <!-- F2 -> Debezium SQLS -->
  <line class="flow-cdc" x1="260" y1="260" x2="320" y2="260" marker-end="url(#arrowGreen)"/>
  <!-- F3 -> Debezium PG -->
  <line class="flow-cdc" x1="260" y1="360" x2="320" y2="360" marker-end="url(#arrowGreen)"/>

  <!-- Connectors -> Kafka -->
  <line class="flow" x1="420" y1="200" x2="420" y2="440" marker-end="url(#arrow)"/>
  <line class="flow" x1="420" y1="300" x2="420" y2="440" marker-end="url(#arrow)"/>
  <line class="flow" x1="420" y1="400" x2="420" y2="440" marker-end="url(#arrow)"/>

  <!-- Kafka -> Flink -->
  <line class="flow" x1="420" y1="540" x2="420" y2="560" marker-end="url(#arrow)"/>

  <!-- Flink -> Bronze -->
  <line class="flow" x1="520" y1="600" x2="580" y2="170" marker-end="url(#arrow)"/>

  <!-- Bronze -> Silver -> Gold -->
  <line class="flow" x1="720" y1="220" x2="720" y2="240" marker-end="url(#arrow)"/>
  <line class="flow" x1="720" y1="360" x2="720" y2="380" marker-end="url(#arrow)"/>

  <!-- Compute side links -->
  <line class="flow" x1="720" y1="500" x2="720" y2="520" marker-end="url(#arrow)"/>

  <!-- Gold -> Trino, Spark, Neo4j -->
  <line class="flow" x1="860" y1="430" x2="920" y2="180" marker-end="url(#arrow)"/>
  <line class="flow" x1="860" y1="430" x2="920" y2="320" marker-end="url(#arrow)"/>
  <line class="flow" x1="860" y1="430" x2="920" y2="460" marker-end="url(#arrow)"/>

  <!-- Airflow orchestrates -->
  <line class="flow" x1="260" y1="610" x2="580" y2="560" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(900,560)">
    <rect x="0" y="0" width="360" height="200" fill="#ffffff" stroke="#cbd5e1" rx="8" ry="8"/>
    <text x="12" y="20" font-weight="700" fill="#0f172a">Leyenda</text>
    <line x1="12" y1="40" x2="60" y2="40" class="flow-cdc" marker-end="url(#arrowGreen)"/>
    <text x="70" y="44" class="sub">CDC streaming (impacto mínimo en fuentes)</text>
    <line x1="12" y1="64" x2="60" y2="64" class="flow-batch" marker-end="url(#arrowBlue)"/>
    <text x="70" y="68" class="sub">Pull batch incremental (CRM)</text>
    <line x1="12" y1="88" x2="60" y2="88" class="flow" marker-end="url(#arrow)"/>
    <text x="70" y="92" class="sub">Flujo interno del lake</text>
    <text x="12" y="120" class="sub">Latencia objetivo:</text>
    <text x="20" y="138" class="sub">• Bronze: segundos (CDC) / horas (CRM)</text>
    <text x="20" y="156" class="sub">• Silver: micro-batch 5-15 min</text>
    <text x="20" y="174" class="sub">• Gold: hourly / diario por mart</text>
    <text x="20" y="192" class="sub">• Neo4j: sync diario por delta</text>
  </g>
</svg>
